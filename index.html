<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HUD PRO FIX</title>

<style>
html, body {
  margin:0;
  background:transparent;
  overflow:hidden;
  font-family:Arial;
}

.hud {
  position:absolute;
  bottom:20px;
  left:20px;
  width:300px;
  height:300px;
}

.speedo {
  width:100%;
  height:100%;
  border-radius:50%;
  border:5px solid rgba(255,255,255,0.2);
  position:relative;
}

.needle {
  position:absolute;
  width:4px;
  height:140px;
  background:red;
  bottom:50%;
  left:50%;
  transform-origin:bottom center;
}

.center {
  position:absolute;
  width:14px;
  height:14px;
  background:white;
  border-radius:50%;
  bottom:50%;
  left:50%;
  transform:translate(-50%,50%);
}

.speed-text {
  position:absolute;
  bottom:80px;
  width:100%;
  text-align:center;
  font-size:42px;
  color:white;
  font-weight:bold;
}

.compass {
  position:absolute;
  top:-40px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-size:18px;
}
</style>
</head>

<body>

<div class="hud">
  <div class="compass" id="compass">-</div>
  <div class="speedo">
    <div class="needle" id="needle"></div>
    <div class="center"></div>
    <div class="speed-text" id="speed">TAP</div>
  </div>
</div>

<script>
let currentSpeed = 0;
let targetSpeed = 0;
let active = false;

// GPS
document.body.addEventListener("click", () => {
  if (active) return;

  navigator.geolocation.watchPosition(pos => {
    let speed = pos.coords.speed;
    if (speed !== null) {
      targetSpeed = speed * 3.6;
      active = true;
    }

    // COMPASS FIX
    let heading = pos.coords.heading;
    if (heading !== null) {
      let dir = "N";
      if (heading > 45 && heading <= 135) dir = "E";
      else if (heading > 135 && heading <= 225) dir = "S";
      else if (heading > 225 && heading <= 315) dir = "W";
      document.getElementById("compass").innerText = dir;
    } else {
      document.getElementById("compass").innerText = "GPS";
    }

  }, err => console.log(err), {
    enableHighAccuracy:true
  });
});

// ANIMASI
function animate() {
  if (active) {
    currentSpeed += (targetSpeed - currentSpeed) * 0.15;
  }

  let display = Math.round(currentSpeed);
  document.getElementById("speed").innerText = display;

  // FIX ANGLE (0 = kiri bawah, 180 = kanan)
  let angle = (currentSpeed / 180) * 270 - 135;

  document.getElementById("needle").style.transform =
    "rotate(" + angle + "deg)";

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
